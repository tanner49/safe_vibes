services:
  postgres:
    image: postgres:16
    container_name: save_vibes_demo_postgres
    environment:
      POSTGRES_DB: save_vibes_demo
      POSTGRES_USER: save_vibes_demo
      POSTGRES_PASSWORD: save_vibes_demo
    ports:
      - "55432:5432"
    volumes:
      - save_vibes_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U save_vibes_demo -d save_vibes_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  save_vibes_demo_postgres_data:
