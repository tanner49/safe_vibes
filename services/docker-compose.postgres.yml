services:
  postgres:
    image: postgres:16
    container_name: safe_reports_demo_postgres
    environment:
      POSTGRES_DB: safe_reports_demo
      POSTGRES_USER: safe_reports_demo
      POSTGRES_PASSWORD: safe_reports_demo
    ports:
      - "55432:5432"
    volumes:
      - safe_reports_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safe_reports_demo -d safe_reports_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  safe_reports_demo_postgres_data:
