services:
  web:
    build: .
    env_file:
      - .env.docker.example
    environment:
      DATABASE_URL: postgres://save_vibes:save_vibes@db:5432/save_vibes
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: save_vibes
      POSTGRES_USER: save_vibes
      POSTGRES_PASSWORD: save_vibes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U save_vibes -d save_vibes"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
